<!DOCTYPE html>
<html lang="en" dir="ltr" id="html-root">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#000008" />
  <title>GeoZakhraf · Xhaos Engine</title>
  <link rel="stylesheet" href="styles.css" />

  <!-- Three.js r158 via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- Three.js Post-Processing (EffectComposer etc.) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
</head>
<body>

  <!-- ═══════════════════════════════════════════
       LOADING SCREEN
  ═══════════════════════════════════════════ -->
  <div id="loader" class="loader">
    <div class="loader-brand">
      <span class="loader-geo">GEO</span><span class="loader-zakhraf">ZAKHRAF</span>
    </div>
    <div class="loader-subtitle" data-en="Xhaos Engine Initializing" data-ar="محرك الفوضى يبدأ التشغيل">
      Xhaos Engine Initializing
    </div>
    <div class="loader-bar-wrap"><div class="loader-bar" id="loader-bar"></div></div>
    <div class="loader-percent" id="loader-percent">0%</div>
  </div>

  <!-- ═══════════════════════════════════════════
       MAIN LAYOUT
  ═══════════════════════════════════════════ -->
  <div id="app" class="app hidden">

    <!-- Header -->
    <header class="hud-header glass">
      <div class="brand">
        <span class="brand-geo">GEO</span><span class="brand-zakhraf">ZAKHRAF</span>
        <span class="brand-tag" id="brand-tag">XHAOS ENGINE</span>
      </div>
      <div class="hud-controls">
        <button class="icon-btn" id="btn-lang" title="Toggle Language / تبديل اللغة">AR</button>
        <button class="icon-btn" id="btn-pov"  title="POV Mode">⊙</button>
        <button class="icon-btn" id="btn-audio" title="Audio React">♫</button>
        <button class="icon-btn" id="btn-fullscreen" title="Fullscreen">⛶</button>
      </div>
    </header>

    <!-- 2D Canvas Layer -->
    <canvas id="canvas2d"></canvas>

    <!-- 3D WebGL Layer -->
    <canvas id="canvas3d"></canvas>

    <!-- ═══════════════════════════════════════
         SIDE PANEL — Presets
    ═══════════════════════════════════════ -->
    <aside id="panel-presets" class="side-panel glass" aria-label="Presets Panel">
      <div class="panel-header">
        <span data-en="PRESETS" data-ar="الإعدادات المسبقة">PRESETS</span>
        <button class="icon-btn small" id="btn-toggle-panel">‹</button>
      </div>

      <div class="preset-search-wrap">
        <input type="text" id="preset-search" placeholder="Search formula…" autocomplete="off" />
      </div>

      <div class="preset-tabs">
        <button class="tab-btn active" data-tab="2d" data-en="2D BG" data-ar="خلفية 2D">2D BG</button>
        <button class="tab-btn" data-tab="3d" data-en="3D FACE" data-ar="وجه 3D">3D FACE</button>
      </div>

      <div class="preset-list" id="preset-list">
        <!-- Populated by ui.js -->
      </div>
    </aside>

    <!-- ═══════════════════════════════════════
         BOTTOM BAR — Live Parameters
    ═══════════════════════════════════════ -->
    <div class="bottom-bar glass" id="bottom-bar">
      <div class="param-group">
        <label data-en="Speed" data-ar="السرعة">Speed</label>
        <input type="range" id="param-speed" min="0" max="3" step="0.01" value="1" />
        <span class="param-val" id="val-speed">1.00</span>
      </div>
      <div class="param-group">
        <label data-en="Scale" data-ar="النطاق">Scale</label>
        <input type="range" id="param-scale" min="0.1" max="5" step="0.01" value="1" />
        <span class="param-val" id="val-scale">1.00</span>
      </div>
      <div class="param-group">
        <label data-en="Chaos" data-ar="الفوضى">Chaos</label>
        <input type="range" id="param-chaos" min="0" max="1" step="0.01" value="0.5" />
        <span class="param-val" id="val-chaos">0.50</span>
      </div>
      <div class="param-group">
        <label data-en="Bloom" data-ar="الإضاءة">Bloom</label>
        <input type="range" id="param-bloom" min="0" max="3" step="0.01" value="1.2" />
        <span class="param-val" id="val-bloom">1.20</span>
      </div>
      <div class="param-group">
        <label data-en="Rotation" data-ar="الدوران">Rotation</label>
        <input type="range" id="param-rotation" min="-2" max="2" step="0.01" value="0.3" />
        <span class="param-val" id="val-rotation">0.30</span>
      </div>
      <button class="action-btn" id="btn-shatter" data-en="SHATTER" data-ar="تحطيم">SHATTER</button>
      <button class="action-btn" id="btn-randomize" data-en="RANDOMIZE" data-ar="عشوائي">RANDOMIZE</button>
    </div>

    <!-- ═══════════════════════════════════════
         SYNC INDICATOR
    ═══════════════════════════════════════ -->
    <div class="sync-hud glass" id="sync-hud">
      <div class="sync-row">
        <span class="sync-label" data-en="2D" data-ar="ثنائي">2D</span>
        <div class="sync-bar"><div class="sync-fill" id="sync-2d-fill"></div></div>
      </div>
      <div class="sync-row">
        <span class="sync-label" data-en="3D" data-ar="ثلاثي">3D</span>
        <div class="sync-bar"><div class="sync-fill" id="sync-3d-fill"></div></div>
      </div>
      <div class="sync-row">
        <span class="sync-label" data-en="Ω" data-ar="Ω">Ω</span>
        <div class="sync-bar"><div class="sync-fill" id="sync-omega-fill" style="background:var(--accent-gold)"></div></div>
      </div>
    </div>

    <!-- Active Preset Label -->
    <div class="active-label glass" id="active-label">
      <span id="active-preset-num">01</span>
      <span id="active-preset-name">Fiber Optics</span>
    </div>

  </div><!-- /#app -->

  <!-- Scripts (order matters) -->
  <script src="audio.js"></script>
  <script src="engine2d.js"></script>
  <script src="cube3d.js"></script>
  <script src="ui.js"></script>
  <script src="main.js"></script>

</body>
</html>
