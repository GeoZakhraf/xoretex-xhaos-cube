<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="description" content="Xoretex Xhaos Cube — 2D+3D Particle Physics Engine">
<meta name="theme-color" content="#00ff88">
<title>Xoretex Xhaos Cube</title>

<!-- Three.js for 3D cube -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Fira+Code:wght@400;700&family=Noto+Kufi+Arabic:wght@400;700&display=swap');
:root{
    --p:rgba(8,8,20,.95);--a:#00ff88;--a2:#00ccff;--a3:#ff00aa;
    --d:#ff2244;--t:#ccc;--dm:rgba(255,255,255,.04);--bd:rgba(0,255,136,.1);
    --f:'Fira Code',monospace;--fb:'Orbitron',sans-serif;--fa:'Noto Kufi Arabic',sans-serif
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body,html{overflow:hidden;background:#020208;font-family:var(--f);color:var(--t);height:100%;touch-action:none}

/* === CANVAS LAYERS === */
canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%}
#bgCan{z-index:0}           /* Stars background */
#flowCan{z-index:1}         /* 2D particle flow (Xoretex) */
#glowCan{z-index:2;pointer-events:none;opacity:.5;mix-blend-mode:screen}
#cubeCan{z-index:3}         /* 3D cube (Three.js) */
#connCan{z-index:4;pointer-events:none;opacity:.3}
#flowCan.mblur{filter:blur(0.5px)}

/* === RTL === */
html[dir=rtl]{font-family:var(--fa),var(--f)}
html[dir=rtl] #panel{right:auto;left:10px}
html[dir=rtl] #panel.hid{transform:translateX(-400px)}
html[dir=rtl] #togBtn{right:auto;left:380px}
html[dir=rtl] #togBtn.shifted{left:15px}

/* === SCROLLBAR === */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--a);border-radius:3px}

/* === PANEL === */
#panel{position:fixed;top:10px;right:10px;width:358px;background:var(--p);backdrop-filter:blur(20px);border-radius:14px;border:1px solid var(--bd);z-index:100;max-height:95vh;overflow-y:auto;box-shadow:0 0 30px rgba(0,255,136,.08);transition:transform .35s,opacity .35s}
#panel.hid{transform:translateX(400px);opacity:0;pointer-events:none}

/* === HEADER === */
.phead{padding:15px 17px 11px;border-bottom:1px solid rgba(255,255,255,.04);position:relative;overflow:hidden}
.phead::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--a),var(--a2),var(--a3),var(--a));background-size:300%;animation:rbsl 5s linear infinite}
@keyframes rbsl{0%,100%{background-position:0%}50%{background-position:100%}}
.brandRow{display:flex;align-items:center;gap:10px}
.brandIcon{width:35px;height:35px;border-radius:10px;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;font-family:var(--fb);font-size:15px;font-weight:900;color:#000;flex-shrink:0;animation:ipulse 3s ease-in-out infinite}
@keyframes ipulse{0%,100%{box-shadow:0 0 15px rgba(0,255,136,.2)}50%{box-shadow:0 0 25px rgba(0,255,136,.5)}}
.brandName{font-family:var(--fb);font-size:.83rem;font-weight:900;background:linear-gradient(90deg,var(--a),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
.brandSub{font-size:.48rem;opacity:.3;letter-spacing:1px;margin-top:1px}
.headerTools{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.htool{width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s}
.htool:hover{background:rgba(0,255,136,.08);border-color:var(--a)}
.htool.on{background:rgba(0,255,136,.1);border-color:var(--a);color:var(--a)}

/* === MODE TABS (2D / 3D / BOTH) === */
.modeTabs{display:flex;gap:3px;margin-top:8px}
.modeTab{flex:1;padding:6px;text-align:center;font-family:var(--fb);font-size:.5rem;letter-spacing:1px;color:rgba(255,255,255,.3);background:var(--dm);border:1px solid rgba(255,255,255,.05);border-radius:5px;cursor:pointer;transition:all .2s}
.modeTab.active{color:var(--a);background:rgba(0,255,136,.08);border-color:var(--a)}
.modeTab:hover{border-color:var(--a)}

/* === STATS === */
.statsRow{display:flex;gap:4px;padding:9px 17px;border-bottom:1px solid rgba(255,255,255,.03)}
.statBox{flex:1;background:rgba(0,255,136,.03);border:1px solid rgba(0,255,136,.06);border-radius:7px;padding:5px 3px;text-align:center}
.statNum{font-family:var(--fb);font-size:.72rem;color:var(--a);font-weight:700}
.statLbl{font-size:.41rem;opacity:.35;text-transform:uppercase;margin-top:1px}

/* === SECTIONS === */
.sec{padding:11px 17px;border-bottom:1px solid rgba(255,255,255,.03)}
.stitle{font-family:var(--fb);font-size:.52rem;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.3);margin-bottom:9px;display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none}
.stitle .arrow{font-size:7px;margin-left:auto;opacity:.3;transition:transform .3s}
.stitle.shut .arrow{transform:rotate(-90deg)}
.scontent{transition:all .3s;overflow:hidden}
.stitle.shut+.scontent{max-height:0!important;opacity:0}

/* === COMMON CONTROLS === */
.dropdown{width:100%;background:rgba(0,0,0,.5);color:var(--t);border:1px solid rgba(255,255,255,.08);border-radius:7px;padding:8px 11px;font-family:var(--f);font-size:.62rem;cursor:pointer;appearance:none}
.dropdown:focus{outline:none;border-color:var(--a)}
.dropdown option{background:#0a0a18}
.presetChips{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-top:7px}
.pchip{padding:5px 2px;text-align:center;background:var(--dm);border:1px solid rgba(255,255,255,.04);border-radius:6px;cursor:pointer;font-size:15px;transition:all .2s}
.pchip:hover{background:rgba(0,255,136,.08);transform:translateY(-2px)}

/* Inject */
.injWrap{position:relative}
.injInput{width:100%;height:52px;background:rgba(0,0,0,.6);color:var(--a);border:1px solid rgba(0,255,136,.1);border-radius:7px;padding:9px 28px 9px 10px;font-family:var(--f);font-size:.6rem;resize:none;transition:all .3s;line-height:1.5}
.injInput:focus{outline:none;border-color:var(--a);height:78px}
.injInput.err{border-color:var(--d);color:#f66}
.injDot{position:absolute;top:8px;right:8px;width:7px;height:7px;border-radius:50%;background:#333;transition:all .3s}
.injDot.ok{background:var(--a);box-shadow:0 0 6px var(--a)}
.injDot.err{background:var(--d)}
.varChips{display:flex;flex-wrap:wrap;gap:2px;margin-top:5px}
.vchip{font-size:.48rem;padding:2px 7px;background:rgba(0,255,136,.05);border:1px solid rgba(0,255,136,.08);border-radius:3px;cursor:pointer;color:var(--a);transition:all .2s}
.vchip:hover{background:rgba(0,255,136,.15)}

/* Formula library */
.flibWrap{margin-top:7px}
.flibBtn{width:100%;padding:7px;background:rgba(0,204,255,.05);border:1px dashed rgba(0,204,255,.15);border-radius:6px;cursor:pointer;font-size:.53rem;color:var(--a2);text-align:center}
.flibBtn:hover{background:rgba(0,204,255,.12)}
.flibGrid{display:none;grid-template-columns:1fr 1fr;gap:3px;margin-top:5px}
.flibGrid.open{display:grid}
.flibItem{padding:5px 7px;background:var(--dm);border:1px solid rgba(255,255,255,.04);border-radius:5px;cursor:pointer;font-size:.48rem;transition:all .2s}
.flibItem:hover{background:rgba(0,255,136,.06);border-color:var(--a)}
.flibItem .flName{color:var(--a);font-weight:700;font-size:.52rem}
.flibItem .flCode{opacity:.3;font-size:.38rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Layer */
.layerBox{background:var(--dm);border:1px solid rgba(255,255,255,.05);padding:11px;border-radius:9px;margin-bottom:7px;transition:all .3s;animation:layAnim .35s ease-out}
@keyframes layAnim{from{opacity:0;transform:translateY(-7px)}to{opacity:1}}
.layerBox:hover{border-color:rgba(255,255,255,.1)}
.layerBox.off{opacity:.22;filter:grayscale(.8)}
.layerBox.focused{border-color:var(--a);box-shadow:0 0 14px rgba(0,255,136,.14)}
.layHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.layId{display:flex;align-items:center;gap:6px;cursor:pointer}
.layDot{width:7px;height:7px;border-radius:50%}
.layName{font-family:var(--fb);font-size:.57rem;font-weight:700;letter-spacing:1px}
.layBtns{display:flex;gap:3px}
.layBtn{width:23px;height:23px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .2s}
.layBtn:hover{background:rgba(0,255,136,.1);border-color:var(--a)}
.layBtn.on{background:rgba(0,255,136,.1);border-color:var(--a);color:var(--a)}
.layBtn.del:hover{background:rgba(255,0,0,.15);border-color:var(--d);color:var(--d)}
textarea.layCode{width:100%;height:47px;background:rgba(0,0,0,.5);color:var(--a);border:1px solid rgba(0,255,136,.08);border-radius:5px;padding:7px 9px;font-family:var(--f);font-size:.57rem;resize:none;line-height:1.5}
textarea.layCode:focus{outline:none;border-color:var(--a)}
textarea.layCode.err{border-color:var(--d)}
.layOpts{display:flex;gap:7px;margin-top:7px;align-items:center;flex-wrap:wrap}
input[type=color].colorPick{width:27px;height:27px;border:none;border-radius:5px;cursor:pointer;background:none}
input[type=color].colorPick::-webkit-color-swatch-wrapper{padding:1px}
input[type=color].colorPick::-webkit-color-swatch{border:1px solid rgba(255,255,255,.15);border-radius:4px}
.miniCtrl{flex:1;min-width:55px}
.miniLbl{font-size:.43rem;opacity:.3;display:flex;justify-content:space-between}
.miniVal{color:var(--a)}
.palRow{display:flex;gap:2px;margin-top:5px;width:100%}
.palSw{flex:1;height:12px;border-radius:3px;border:1px solid rgba(255,255,255,.08)}
.palSw:hover{transform:scaleY(1.4);border-color:var(--a)}
.palSel{width:100%;margin-top:3px;background:rgba(0,0,0,.4);color:var(--t);border:1px solid rgba(255,255,255,.06);border-radius:3px;padding:3px;font-size:.46rem;appearance:none;cursor:pointer}

/* Range */
input[type=range]{width:100%;height:3px;-webkit-appearance:none;background:rgba(255,255,255,.06);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--a);cursor:pointer;box-shadow:0 0 5px rgba(0,255,136,.4);border:2px solid rgba(0,0,0,.3)}

/* Controls */
.ctrl{margin:7px 0}
.ctrlLbl{display:flex;justify-content:space-between;font-size:.57rem;margin-bottom:4px;opacity:.5}
.ctrlVal{color:var(--a);font-weight:600;opacity:1}
.selectBox{width:100%;background:rgba(0,0,0,.4);color:var(--t);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:7px;font-family:var(--f);font-size:.57rem;cursor:pointer;appearance:none}

/* Toggle */
.togRow{display:flex;align-items:center;justify-content:space-between;margin:7px 0}
.togLbl{font-size:.57rem;opacity:.5}
.togSw{width:35px;height:18px;border-radius:9px;background:rgba(255,255,255,.08);cursor:pointer;position:relative;transition:all .3s}
.togSw.on{background:rgba(0,255,136,.3)}
.togSw::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#555;transition:all .3s}
.togSw.on::after{left:19px;background:var(--a)}

/* Buttons */
.btn{width:100%;padding:9px;cursor:pointer;border-radius:7px;font-family:var(--f);font-weight:700;font-size:.62rem;letter-spacing:1px;border:none;transition:all .2s}
.btnMain{background:linear-gradient(135deg,var(--a),#00cc66);color:#000}
.btnMain:hover{transform:translateY(-2px)}
.btnOut{background:rgba(0,255,136,.06);color:var(--a);border:1px solid rgba(0,255,136,.2)}
.btnOut:hover{background:rgba(0,255,136,.12)}
.btnRow{display:flex;gap:5px}
.btnRow .btn{flex:1}

/* Action grid */
.actGrid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.actBtn{padding:8px 5px;text-align:center;background:var(--dm);border:1px solid rgba(255,255,255,.05);border-radius:7px;cursor:pointer;font-size:.56rem;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:3px}
.actBtn:hover{background:rgba(0,255,136,.06);border-color:var(--bd)}
.actBtn.recOn{border-color:var(--d);color:var(--d)}

/* Audio */
.audViz{display:flex;align-items:flex-end;gap:1px;height:28px;background:rgba(0,0,0,.3);border-radius:5px;padding:3px;overflow:hidden}
.audBar{flex:1;min-width:2px;background:var(--a);border-radius:1px}

/* Symmetry */
.symChips{display:flex;gap:3px}
.symChip{flex:1;padding:5px;text-align:center;background:var(--dm);border:1px solid rgba(255,255,255,.05);border-radius:5px;cursor:pointer;font-size:.57rem}
.symChip.active{background:rgba(0,255,136,.1);border-color:var(--a);color:var(--a)}
.symChip:hover{border-color:var(--a)}

/* Fields */
.ffList{display:flex;flex-direction:column;gap:3px}
.ffItem{display:flex;align-items:center;gap:7px;padding:5px 7px;background:var(--dm);border-radius:5px;font-size:.48rem}
.ffItem strong{color:var(--a)}
.ffAdd{flex:1;padding:5px;text-align:center;background:var(--dm);border:1px dashed rgba(255,255,255,.08);border-radius:5px;cursor:pointer;font-size:.52rem}
.ffAdd:hover{border-color:var(--a);color:var(--a)}

/* Games */
.gameBar{position:fixed;top:9px;left:50%;transform:translateX(-50%);z-index:150;display:none;align-items:center;gap:9px;background:var(--p);border:1px solid var(--bd);border-radius:9px;padding:7px 15px}
.gameBar.active{display:flex}
.gameScore{font-family:var(--fb);font-size:.77rem;color:var(--a);font-weight:700}
.gameLabel{font-size:.5rem;opacity:.4}
.gameBtn{padding:4px 10px;border-radius:5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);cursor:pointer;font-size:.5rem}
.obstacle{position:absolute;pointer-events:none;z-index:45;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12)}

/* 3D Cube specific */
.cube3dControls{display:flex;gap:4px;margin-top:6px}
.cubePreset{flex:1;padding:6px;text-align:center;background:var(--dm);border:1px solid rgba(255,255,255,.05);border-radius:5px;cursor:pointer;font-size:.5rem;transition:all .2s}
.cubePreset.active{background:rgba(0,204,255,.1);border-color:var(--a2);color:var(--a2)}
.cubePreset:hover{border-color:var(--a2)}

/* Pattern grid for cube */
.patGrid{display:grid;grid-template-columns:repeat(6,1fr);gap:2px;margin-top:5px}
.patCell{aspect-ratio:1;border-radius:3px;cursor:pointer;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:7px;color:rgba(255,255,255,.3)}
.patCell.active{background:rgba(0,255,255,.2);border-color:rgba(0,255,255,.4);color:#0ff}

/* Toggle btn */
#togBtn{position:fixed;top:14px;right:378px;z-index:101;width:39px;height:39px;background:var(--p);border:1px solid var(--bd);border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .35s}
#togBtn:hover{background:rgba(0,255,136,.08)}
#togBtn.shifted{right:14px}

/* Field markers */
.fieldMark{position:fixed;pointer-events:none;z-index:50;border-radius:50%;transform:translate(-50%,-50%);animation:fmpulse 2s ease-in-out infinite}
@keyframes fmpulse{0%,100%{opacity:.4;transform:translate(-50%,-50%) scale(1)}50%{opacity:.8;transform:translate(-50%,-50%) scale(1.3)}}

/* Touch ring */
.touchRing{position:fixed;pointer-events:none;border:2px solid var(--a);border-radius:50%;transform:translate(-50%,-50%);opacity:0;z-index:50;transition:opacity .25s}
.touchRing.on{opacity:.35}
.touchRing.repel{border-color:var(--d)}

/* Toast */
#toast{position:fixed;bottom:19px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--p);border:1px solid var(--a);border-radius:9px;padding:9px 22px;font-size:.67rem;z-index:500;box-shadow:0 0 22px rgba(0,255,136,.15);transition:transform .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}

/* Modal */
.modalOv{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:600;display:none;align-items:center;justify-content:center}
.modalOv.active{display:flex}
.modalBox{background:var(--p);border:1px solid var(--bd);border-radius:15px;max-width:510px;width:92%;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;animation:modAnim .35s ease-out}
@keyframes modAnim{from{opacity:0;transform:scale(.95) translateY(14px)}to{opacity:1}}
.modalHdr{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between}
.modalTitle{font-family:var(--fb);font-size:.87rem;font-weight:900;color:var(--a)}
.modalClose{width:29px;height:29px;border-radius:7px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px}
.modalClose:hover{background:rgba(255,0,0,.1);color:var(--d)}
.modalBody{padding:18px 20px;overflow-y:auto;flex:1}
.helpStep{display:flex;gap:11px;margin-bottom:14px;padding:11px;background:var(--dm);border-radius:9px}
.helpNum{width:30px;height:30px;border-radius:7px;flex-shrink:0;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;font-family:var(--fb);font-size:.75rem;font-weight:900;color:#000}
.helpTxt h4{font-size:.65rem;margin-bottom:3px;color:var(--a)}
.helpTxt p{font-size:.55rem;opacity:.6;line-height:1.4}
.modalFoot{padding:13px 20px;border-top:1px solid rgba(255,255,255,.05);display:flex;gap:7px;align-items:center}
.modalFoot label{font-size:.5rem;opacity:.4;flex:1;display:flex;align-items:center;gap:5px;cursor:pointer}
.modalFoot input[type=checkbox]{accent-color:var(--a)}

/* Rec progress */
.recProg{position:fixed;top:56px;left:50%;transform:translateX(-50%);background:var(--p);border:1px solid var(--d);border-radius:9px;padding:7px 18px;z-index:500;display:none;font-size:.65rem;color:var(--d)}

/* Cycle preview */
.cycPrev{height:18px;border-radius:5px;background:linear-gradient(90deg,#f00,#fa0,#0f0,#0ff,#00f,#f0f,#f00);opacity:0;transition:opacity .3s;margin-top:4px}

/* Record format */
.recFmt{display:flex;gap:3px;margin-top:5px}
.recOpt{flex:1;padding:7px;text-align:center;background:var(--dm);border:1px solid rgba(255,255,255,.05);border-radius:5px;cursor:pointer;font-size:.57rem}
.recOpt.active{background:rgba(0,255,136,.1);border-color:var(--a);color:var(--a)}

/* Shatter effect */
.shockwave{position:fixed;pointer-events:none;z-index:5;border-radius:50%;border:1px solid rgba(0,255,255,.6);animation:shockAnim .6s ease-out forwards}
@keyframes shockAnim{0%{width:0;height:0;opacity:.8}100%{width:200px;height:200px;opacity:0}}

@media(max-width:768px){
    #panel{width:calc(100% - 16px);max-height:58vh;bottom:8px;top:auto;border-radius:13px}
    #panel.hid{transform:translateY(120%)}
    html[dir=rtl] #panel{left:8px;right:8px}
    #togBtn{top:auto;bottom:13px;right:13px}
    #togBtn.shifted{right:13px}
    html[dir=rtl] #togBtn{left:13px;right:auto}
    .modalBox{width:96%;max-height:85vh}
}
</style>
</head>
<body>

<!-- Canvas layers -->
<canvas id="bgCan"></canvas>
<canvas id="flowCan"></canvas>
<canvas id="glowCan"></canvas>
<canvas id="cubeCan"></canvas>
<canvas id="connCan"></canvas>

<!-- Overlays -->
<div class="touchRing" id="touchRing"></div>
<div id="fieldMarkers"></div>
<div id="obsLayer"></div>

<!-- Game bar -->
<div class="gameBar" id="gameBar">
    <div><div class="gameLabel" id="gameLabel"></div><div class="gameScore" id="gameScore">0</div></div>
    <div class="gameBtn" onclick="exitGame()">✕</div>
</div>

<!-- Panel toggle -->
<div id="togBtn" onclick="togglePanel()">⚡</div>

<!-- MAIN PANEL -->
<div id="panel">
    <!-- Header -->
    <div class="phead">
        <div class="brandRow">
            <div class="brandIcon">X</div>
            <div>
                <div class="brandName" data-t="brand">XORETEX XHAOS CUBE</div>
                <div class="brandSub" data-t="subtitle">2D+3D PARTICLE ENGINE v8.0</div>
            </div>
        </div>
        <div class="headerTools">
            <div class="htool" onclick="toggleLang()">🌐</div>
            <div class="htool" onclick="showHelp()">❓</div>
            <div class="htool" onclick="togglePause()" id="pauseBtn">⏸</div>
            <div class="htool" onclick="toggleFullscreen()">⛶</div>
            <div class="htool" onclick="exportHiRes()">📷</div>
            <div class="htool" id="recBtnH" onclick="toggleRecord()">⏺</div>
        </div>
        <!-- Mode tabs: control what's visible -->
        <div class="modeTabs">
            <div class="modeTab active" onclick="setViewMode('both',this)" data-t="mode_both">🎆 BOTH</div>
            <div class="modeTab" onclick="setViewMode('2d',this)" data-t="mode_2d">🌊 2D Flow</div>
            <div class="modeTab" onclick="setViewMode('3d',this)" data-t="mode_3d">🎲 3D Cube</div>
        </div>
    </div>

    <!-- Stats -->
    <div class="statsRow">
        <div class="statBox"><div class="statNum" id="s-fps">60</div><div class="statLbl" data-t="fps">FPS</div></div>
        <div class="statBox"><div class="statNum" id="s-pts">0</div><div class="statLbl" data-t="particles_lbl">PTS</div></div>
        <div class="statBox"><div class="statNum" id="s-lyr">0</div><div class="statLbl" data-t="layers_lbl">LYR</div></div>
        <div class="statBox"><div class="statNum" id="s-time">0.0</div><div class="statLbl" data-t="time_lbl">TIME</div></div>
        <div class="statBox"><div class="statNum" id="s-pat">1/60</div><div class="statLbl" data-t="pattern_lbl">PAT</div></div>
    </div>

    <!-- All sections will be populated by engine scripts -->
    <div id="panelSections"></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Rec Progress -->
<div class="recProg" id="recProg">
    🔴 <span id="recTimer">00:00</span> / <span id="recTotal">00:10</span>
    <div style="width:100%;height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:3px">
        <div id="recBar" style="height:100%;background:var(--d);border-radius:2px;transition:width .5s;width:0%"></div>
    </div>
</div>

<!-- Help Modal -->
<div class="modalOv" id="helpModal">
    <div class="modalBox">
        <div class="modalHdr">
            <div class="modalTitle" id="helpTitle">🚀</div>
            <div class="modalClose" onclick="closeHelp()">✕</div>
        </div>
        <div class="modalBody" id="helpBody"></div>
        <div class="modalFoot">
            <label><input type="checkbox" onchange="try{localStorage.setItem('xnh',this.checked?'1':'0')}catch(e){}"><span data-t="dont_show">Don't show again</span></label>
            <button class="btn btnMain" style="width:auto;padding:7px 20px" onclick="closeHelp()" data-t="ok_btn">OK</button>
        </div>
    </div>
</div>

<!-- SVG Modal -->
<div class="modalOv" id="svgModal">
    <div class="modalBox">
        <div class="modalHdr"><div class="modalTitle">📐 SVG</div><div class="modalClose" onclick="document.getElementById('svgModal').classList.remove('active')">✕</div></div>
        <div class="modalBody"><textarea id="svgOutput" style="width:100%;height:280px;background:#000;color:var(--a);border:1px solid #333;border-radius:7px;padding:10px;font-size:.5rem;font-family:var(--f)" readonly></textarea></div>
        <div class="modalFoot"><button class="btn btnOut" onclick="navigator.clipboard.writeText(document.getElementById('svgOutput').value);toast('📋!')">📋</button><button class="btn btnMain" style="width:auto;padding:7px 18px;margin-left:7px" onclick="downloadSVG()">💾</button></div>
    </div>
</div>

<!-- GLSL Modal -->
<div class="modalOv" id="glslModal">
    <div class="modalBox">
        <div class="modalHdr"><div class="modalTitle">🖥️ GLSL</div><div class="modalClose" onclick="document.getElementById('glslModal').classList.remove('active')">✕</div></div>
        <div class="modalBody"><textarea id="glslOutput" style="width:100%;height:280px;background:#000;color:var(--a3);border:1px solid #333;border-radius:7px;padding:10px;font-size:.5rem;font-family:var(--f)" readonly></textarea><div style="font-size:.45rem;opacity:.25;margin-top:4px">→ <a href="https://shadertoy.com/new" target="_blank" style="color:var(--a2)">Shadertoy</a></div></div>
        <div class="modalFoot"><button class="btn btnOut" onclick="navigator.clipboard.writeText(document.getElementById('glslOutput').value);toast('📋!')">📋</button></div>
    </div>
</div>

<!-- Load both engines -->
<script src="engine2d.js"></script>
<script src="cube3d.js"></script>

</body>
</html>
